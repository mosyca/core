services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Registry is public so it can be fetched from the container directly
    # (tests, Gateway, Console Adapter).
    Mosyca\Core\Action\ActionRegistry:
        public: true

    # Output Pipeline — all renderers explicit so library consumers get them
    # without a wildcard resource scan.
    Mosyca\Core\Renderer\Normalizer: ~
    Mosyca\Core\Renderer\JsonRenderer: ~
    Mosyca\Core\Renderer\YamlRenderer: ~
    Mosyca\Core\Renderer\RawRenderer: ~
    Mosyca\Core\Renderer\TableRenderer: ~
    Mosyca\Core\Renderer\TwigRenderer: ~
    Mosyca\Core\Renderer\McpRenderer: ~
    Mosyca\Core\Renderer\OutputRenderer: ~
    Mosyca\Core\Renderer\OutputRendererInterface:
        alias: Mosyca\Core\Renderer\OutputRenderer

    # Console Adapter — tagged console.command_loader so Symfony's Application
    # discovers all plugin commands lazily by their plugin name.
    #
    # Note: auto-tagging of ActionInterface implementations is registered via
    # MosycaCoreExtension::registerForAutoconfiguration() — not here — so that
    # it applies globally to all services, not just those in this file.
    Mosyca\Core\Console\ConsoleAdapter:
        public: true

    # Built-in management commands (autoconfigure adds console.command tag via #[AsCommand]).
    Mosyca\Core\Console\Command\ActionListCommand: ~
    Mosyca\Core\Console\Command\ActionShowCommand: ~

    # — V0.11: Resource Layer —
    # ResourceRegistry is public so the REST gateway and tests can fetch it directly.
    # ResourceRegistrationPass wires all mosyca.resource-tagged services into it at compile time.
    # Auto-tagging of AbstractResource subclasses is configured in MosycaCoreExtension.
    Mosyca\Core\Resource\ResourceRegistry:
        public: true

    # Built-in actions (must be registered so ActionRegistrationPass tags and wires them
    # into ActionRegistry via the mosyca.action tag; auto-tagging via registerForAutoconfiguration
    # only takes effect once the service exists in the container).
    Mosyca\Core\Action\Builtin\PingAction: ~
    Mosyca\Core\Action\Builtin\EchoAction: ~

    # Built-in system resource (core:system — ping + echo).
    Mosyca\Core\Action\Builtin\Resource\SystemResource: ~

    # — V0.11: True-REST Gateway (factory-based, zero custom controllers) —
    # MosycaResource is the API Platform backing class; ResourceMetadataFactory replaces its
    # empty operations array with dynamically-generated HttpOperation objects at compile time,
    # one per operation declared in every registered AbstractResource.
    # ResourceMetadataFactory is registered conditionally (only when ApiPlatformBundle is loaded)
    # in MosycaCoreExtension::load() — not here — to avoid ServiceNotFoundException in test kernels.
    Mosyca\Core\Gateway\Resource\MosycaResource: ~
    Mosyca\Core\Gateway\Provider\ResourceStateProvider: ~
    Mosyca\Core\Gateway\Processor\ResourceStateProcessor: ~

    # — V0.10b: Scaffold from OpenAPI —
    Mosyca\Core\Scaffold\ParameterConstraintMapper: ~
    Mosyca\Core\Scaffold\OpenApiSpecLoader: ~
    Mosyca\Core\Scaffold\ActionStubWriter: ~
    Mosyca\Core\Console\Command\ScaffoldFromOpenApiCommand: ~

    # — V0.9: ExecutionContext —
    # ContextProvider is the only component that knows HTTP + Symfony Security.
    # It bridges HTTP/MCP/CLI transports into a uniform ExecutionContextInterface
    # for plugins. Always registered (no DoctrineBundle dependency).
    # Security services are optional (null when SecurityBundle is not loaded).
    Mosyca\Core\Context\ContextProvider:
        arguments:
            $tokenStorage: '@?security.token_storage'
            $authorizationChecker: '@?security.authorization_checker'

    # Gateway — API Platform providers and processors.
    # Registered explicitly so the bundle works without a wildcard resource scan.
    Mosyca\Core\Gateway\Provider\ActionProvider: ~
    Mosyca\Core\Gateway\Provider\McpToolProvider: ~
    Mosyca\Core\Gateway\Processor\ActionRunProcessor: ~

    # — V0.8: Depot (per-operator filesystem cache) —
    Mosyca\Core\Depot\FilesystemDepot:
        arguments:
            $depotDir: '%mosyca.depot_dir%'

    # — V0.8: Ledger — Access Log + Action Log —
    Mosyca\Core\Ledger\AccessLog:
        arguments:
            $logDir: '%mosyca.log_dir%'

    Mosyca\Core\Ledger\ActionLog:
        arguments:
            $logDir: '%mosyca.log_dir%'

    # — V0.8: Depot CLI commands —
    Mosyca\Core\Depot\Console\DepotListCommand: ~
    Mosyca\Core\Depot\Console\DepotClearCommand: ~

    # — V0.8: Ledger CLI commands —
    Mosyca\Core\Ledger\Console\LedgerTailCommand:
        arguments:
            $logDir: '%mosyca.log_dir%'
    Mosyca\Core\Ledger\Console\LedgerSearchCommand:
        arguments:
            $logDir: '%mosyca.log_dir%'

    # — V0.8: Depot REST controller —
    Mosyca\Core\Depot\Controller\DepotController: ~

    # — V0.13: MCP Bridge PHP-Native (direct registry access, no REST layer) —
    # These services provide list_tools (discovery) and call_tool (execution) without
    # going through API Platform or HTTP routing (ADR 3.1). Autowired from the public
    # ActionRegistry and ResourceRegistry already declared above.
    Mosyca\Core\Bridge\ConstraintSchemaTranslator: ~
    Mosyca\Core\Bridge\McpDiscoveryService: ~
    Mosyca\Core\Bridge\McpExecutionService: ~

    # — V0.13b: MCP HTTP Endpoint (JSON-RPC 2.0) —
    # Single POST /api/v1/mcp/rpc controller wrapping the V0.13 Bridge services.
    # No API Platform, no AbstractController — pure Symfony #[Route] controller.
    Mosyca\Core\Bridge\Controller\McpRpcController: ~

    # — V0.8: Ledger REST controller —
    Mosyca\Core\Ledger\Controller\LedgerController:
        arguments:
            $logDir: '%mosyca.log_dir%'

    # ── V0.14: Core Identity Bootstrap (ADR 1.5) ────────────────────────────
    # YAML-backed providers receive compiled container parameters.
    # Any plugin (e.g. plugin-mosyca-admin-db) can replace the concrete
    # implementation by redefining the interface alias in its own services.yaml.

    Mosyca\Core\Identity\Provider\YamlTenantProvider:
        arguments:
            $tenants: '%mosyca.identity.tenants%'

    Mosyca\Core\Identity\Provider\TenantProviderInterface:
        alias: Mosyca\Core\Identity\Provider\YamlTenantProvider
        public: true

    Mosyca\Core\Identity\Provider\YamlUserProvider:
        arguments:
            $users: '%mosyca.identity.users%'

    Mosyca\Core\Identity\Provider\UserProviderInterface:
        alias: Mosyca\Core\Identity\Provider\YamlUserProvider
        public: true

    Mosyca\Core\Identity\Provider\YamlGroupProvider:
        arguments:
            $groups: '%mosyca.identity.groups%'

    Mosyca\Core\Identity\Provider\GroupProviderInterface:
        alias: Mosyca\Core\Identity\Provider\YamlGroupProvider
        public: true

    # ── Identity Actions (mosyca:tenant:*, mosyca:user:*, mosyca:group:*) ───
    Mosyca\Core\Action\Identity\TenantReadAction: ~
    Mosyca\Core\Action\Identity\TenantListAction: ~
    Mosyca\Core\Action\Identity\UserReadAction: ~
    Mosyca\Core\Action\Identity\UserListAction: ~
    Mosyca\Core\Action\Identity\GroupReadAction: ~
    Mosyca\Core\Action\Identity\GroupListAction: ~

    # ── Identity Resources ───────────────────────────────────────────────────
    Mosyca\Core\Identity\Resource\TenantResource: ~
    Mosyca\Core\Identity\Resource\UserResource: ~
    Mosyca\Core\Identity\Resource\GroupResource: ~
