services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Vault — Security, Clearances, ACL, CLI commands, REST controllers.
    # Loaded only when DoctrineBundle is present (see MosycaCoreExtension).

    # ── V0.14a: Credential Cipher (Encryption at Rest) ──────────────────────
    # Bind SecretCipherInterface to the production Sodium adapter.
    # The master key is read from the environment (hex-encoded 32-byte secret).
    # Tests instantiate DummySecretCipher directly — never via DI.
    Mosyca\Core\Vault\Cipher\SecretCipherInterface:
        class: Mosyca\Core\Vault\Cipher\SodiumSecretCipher
        arguments:
            $masterKey: '%env(MOSYCA_VAULT_MASTER_KEY)%'

    Mosyca\Core\Vault\Cipher\SodiumSecretCipher:
        arguments:
            $masterKey: '%env(MOSYCA_VAULT_MASTER_KEY)%'

    # ── V0.14a: Credential Storage ───────────────────────────────────────────
    Mosyca\Core\Vault\Repository\VaultSecretRepository: ~

    # ── V0.14b: VaultManager & CLI Provisioning ──────────────────────────────
    Mosyca\Core\Vault\VaultManager: ~
    Mosyca\Core\Vault\Console\SetVaultSecretCommand: ~

    # ── V0.14c: VaultAwareHttpClient ─────────────────────────────────────────
    # Decorates the Symfony http_client service with Vault-backed token injection.
    # $allowedUris: empty by default — connector plugins populate this via
    #               compiler passes or config extension (one array per integration).
    # $refreshers:  auto-collected from services tagged mosyca.vault.refresher.
    Mosyca\Core\Vault\Http\VaultAwareHttpClient:
        arguments:
            $inner: '@http_client'
            $allowedUris: []
            $refreshers: !tagged_iterator mosyca.vault.refresher

    # ── V0.14d: Out-of-Band Provisioning & OAuth Callback ───────────────────
    # ProvisioningLinkGenerator: autowired (UrlGeneratorInterface + UriSigner both
    # registered by FrameworkBundle — no explicit arguments needed).
    Mosyca\Core\Vault\Provisioning\ProvisioningLinkGenerator: ~

    # OAuthStateEncoder: HMAC key bound to kernel.secret.
    Mosyca\Core\Vault\Provisioning\OAuthStateEncoder:
        arguments:
            $secret: '%kernel.secret%'

    # REST controllers (autoconfigure adds the controller tag).
    Mosyca\Core\Vault\Controller\ProvisionController: ~

    Mosyca\Core\Vault\Controller\OAuthCallbackController:
        arguments:
            $handlers: !tagged_iterator mosyca.vault.oauth_handler

    # Wire ProvisioningLinkGenerator into McpRpcController when Vault is loaded.
    # This overrides the default constructor (which has $provisioningLinkGenerator = null)
    # so that AUTH_REQUIRED responses carry a signed provisioning URL.
    Mosyca\Core\Bridge\Controller\McpRpcController:
        arguments:
            $provisioningLinkGenerator: '@Mosyca\Core\Vault\Provisioning\ProvisioningLinkGenerator'

    # ── V0.7: Operator Authentication & MCP Tokens ───────────────────────────
    Mosyca\Core\Vault\Repository\OperatorRepository: ~
    Mosyca\Core\Vault\Repository\McpTokenRepository: ~

    Mosyca\Core\Vault\Security\OperatorUserProvider:
        public: true

    Mosyca\Core\Vault\Acl\ActionAccessChecker: ~

    # REST Controllers (autoconfigure adds the controller tag).
    Mosyca\Core\Vault\Controller\AuthController: ~
    Mosyca\Core\Vault\Controller\VaultController: ~

    # CLI Commands (autoconfigure adds console.command tag via #[AsCommand]).
    Mosyca\Core\Vault\Console\CreateOperatorCommand: ~
    Mosyca\Core\Vault\Console\GenerateMcpTokenCommand: ~
    Mosyca\Core\Vault\Console\ListOperatorsCommand: ~
    Mosyca\Core\Vault\Console\SetClearanceCommand: ~

    # ── V0.16: OOB-CA Tenant Session Gate ────────────────────────────────────
    # Provides a human-in-the-loop gate for MCP tenant context switches.
    # All services here require DoctrineBundle (loaded conditionally).

    Mosyca\Core\Bridge\TenantSession\TenantSessionRepository: ~

    Mosyca\Core\Bridge\TenantSession\TenantSessionApprovalUrlGenerator: ~

    Mosyca\Core\Bridge\TenantSession\TenantSessionInterceptor: ~

    # AssumeTenantAction requires Doctrine (TenantSessionRepository) and Lexik JWT.
    # Registered here (DoctrineBundle-conditional) so it is only wired when the DB is available.
    Mosyca\Core\Action\Builtin\AssumeTenantAction: ~

    # Approval UI controller.
    Mosyca\Core\Bridge\Controller\TenantSessionApprovalController: ~

    # Wire TenantSessionInterceptor into McpExecutionService.
    # Overrides the base definition from services.yaml (which has $interceptor = null by default).
    Mosyca\Core\Bridge\McpExecutionService:
        arguments:
            $interceptor: '@Mosyca\Core\Bridge\TenantSession\TenantSessionInterceptor'
